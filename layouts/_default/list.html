{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ .Content }}
<ul class="post-list">
  {{ range .Pages }}
  <li>
    <span class="post-date">{{ .Date.Format "2006-01-02" }}</span>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    {{ if .Params.summary }}
    <p class="post-summary">{{ .Params.summary }}</p>
    {{ end }}
  </li>
  {{ end }}
</ul>
{{ end }}
