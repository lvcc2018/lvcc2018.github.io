<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LLM Roadmap · Ethan Lv</title>
<style>
:root { --bg: #fafafa; --text: #1a1a1f; --muted: #666; --card: #fff; --border: #e5e5e5; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; padding: 0; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; padding: 80px 40px 60px; text-align: center; }
.header h1 { font-size: 2.8em; margin: 0; letter-spacing: -0.03em; }
.header p { font-size: 1.15em; opacity: 0.8; margin: 12px 0 0; }
.header a { color: #93c5fd; text-decoration: none; }
.controls { max-width: 1400px; margin: 0 auto; padding: 20px 32px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.controls label { font-size: 0.85em; font-weight: 600; color: var(--muted); margin-right: 4px; }
.filter-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px; background: var(--card); color: var(--muted); cursor: pointer; font-size: 0.82em; transition: all 0.2s; }
.filter-btn:hover { border-color: #aaa; }
.filter-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
.chart-wrap { max-width: 1400px; margin: 0 auto; padding: 20px 24px; background: var(--card); border-radius: 16px; border: 1px solid var(--border); margin-bottom: 40px; }
.chart-wrap h2 { font-size: 1.1em; margin: 0 0 16px; color: var(--muted); }
.timeline { max-width: 1400px; margin: 0 auto; padding: 0 24px 60px; }
.timeline h2 { font-size: 1.3em; margin: 0 0 24px; }
.tl-group { margin-bottom: 40px; }
.tl-group h3 { font-size: 1em; color: var(--muted); margin: 0 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.tl-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.tl-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; font-size: 0.88em; position: relative; overflow: hidden; }
.tl-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.tl-name { font-weight: 600; font-size: 1.05em; margin-bottom: 4px; }
.tl-org { color: var(--muted); font-size: 0.85em; }
.tl-params { margin-top: 6px; font-size: 0.9em; }
.tl-note { margin-top: 4px; color: var(--muted); font-size: 0.8em; line-height: 1.5; }
footer { text-align: center; padding: 40px; color: var(--muted); font-size: 0.82em; border-top: 1px solid var(--border); }
@media (max-width: 600px) { .header { padding: 50px 20px 40px; } .header h1 { font-size: 1.8em; } .tl-cards { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="header">
  <h1>LLM Roadmap</h1>
  <p>A comprehensive visualization of major language models from 2018 to 2026. Bubble size ≈ parameter count. <a href="/">← Back to home</a></p>
</div>
<div class="controls" id="controls">
  <label>Filter:</label>
  <button class="filter-btn active" data-org="all">All</button>
  <button class="filter-btn" data-org="OpenAI" style="border-left:3px solid #10a37f">OpenAI</button>
  <button class="filter-btn" data-org="Google" style="border-left:3px solid #4285f4">Google</button>
  <button class="filter-btn" data-org="Anthropic" style="border-left:3px solid #d97706">Anthropic</button>
  <button class="filter-btn" data-org="Meta" style="border-left:3px solid #0668e1">Meta</button>
  <button class="filter-btn" data-org="DeepSeek" style="border-left:3px solid #4f46e5">DeepSeek</button>
  <button class="filter-btn" data-org="Alibaba" style="border-left:3px solid #ff6a00">Alibaba</button>
  <button class="filter-btn" data-org="Moonshot" style="border-left:3px solid #ef4444">Moonshot</button>
  <button class="filter-btn" data-org="MiniMax" style="border-left:3px solid #8b5cf6">MiniMax</button>
  <button class="filter-btn" data-org="Zhipu" style="border-left:3px solid #0891b2">Zhipu</button>
  <button class="filter-btn" data-org="Other" style="border-left:3px solid #6b7280">Other</button>
</div>
<div class="chart-wrap">
  <h2>📊 Parameter Scale vs Time (log scale)</h2>
  <canvas id="chart" height="500"></canvas>
</div>
<div class="timeline">
  <h2>📋 Timeline</h2>
  <div id="tl"></div>
</div>
<footer><p>Data from public sources. Built with Chart.js. <a href="/">lvcc2018.github.io</a></p></footer>

<script src="/js/chart.min.js"></script>
<script>
var M=[{n:"GPT-1",o:"OpenAI",p:0.117,d:"2018-06",t:"First GPT. 117M params."},{n:"BERT",o:"Google",p:0.34,d:"2018-10",t:"340M. Bidirectional."},{n:"GPT-2",o:"OpenAI",p:1.5,d:"2019-02",t:"1.5B. \"Too dangerous\"."},{n:"T5-11B",o:"Google",p:11,d:"2019-10",t:"Text-to-text."},{n:"GPT-3",o:"OpenAI",p:175,d:"2020-06",t:"175B. Few-shot emerges."},{n:"GLaM",o:"Google",p:1200,d:"2021-12",t:"1.2T MoE. First trillion-param."},{n:"InstructGPT",o:"OpenAI",p:175,d:"2022-03",t:"RLHF alignment."},{n:"Chinchilla",o:"Other",p:70,d:"2022-03",t:"Compute-optimal. Token:param≈20:1."},{n:"PaLM",o:"Google",p:540,d:"2022-04",t:"540B. CoT prompting."},{n:"OPT-175B",o:"Other",p:175,d:"2022-05",t:"Open GPT-3 replica."},{n:"BLOOM",o:"Other",p:176,d:"2022-07",t:"BigScience. 46 languages."},{n:"LLaMA",o:"Meta",p:65,d:"2023-02",t:"7B-65B. 1.4T tokens."},{n:"GPT-4",o:"OpenAI",p:1800,d:"2023-03",t:"~1.8T MoE. Multimodal."},{n:"Claude 1",o:"Anthropic",p:null,d:"2023-03",t:"Constitutional AI."},{n:"PaLM 2",o:"Google",p:340,d:"2023-05",t:"Smaller but better."},{n:"LLaMA 2",o:"Meta",p:70,d:"2023-07",t:"2T tokens. Commercial."},{n:"Claude 2",o:"Anthropic",p:null,d:"2023-07",t:"100K context."},{n:"Qwen-72B",o:"Alibaba",p:72,d:"2023-09",t:"First Qwen. Bilingual."},{n:"Mistral-7B",o:"Other",p:7,d:"2023-09",t:"Apache 2.0. Sliding window."},{n:"Falcon-180B",o:"Other",p:180,d:"2023-09",t:"TII. RefinedWeb."},{n:"Yi-34B",o:"Other",p:34,d:"2023-11",t:"01.AI. Strong bilingual."},{n:"Gemini 1.0",o:"Google",p:null,d:"2023-12",t:"Natively multimodal."},{n:"Mixtral-8x7B",o:"Other",p:46.7,d:"2023-12",t:"MoE. 12.9B active."},{n:"GLM-4",o:"Zhipu",p:130,d:"2024-01",t:"128K context. All-Tools."},{n:"Gemini 1.5",o:"Google",p:null,d:"2024-02",t:"1M context. MoE."},{n:"Claude 3",o:"Anthropic",p:null,d:"2024-03",t:"Opus/Sonnet/Haiku."},{n:"LLaMA 3",o:"Meta",p:70,d:"2024-04",t:"15T tokens. GQA."},{n:"GPT-4o",o:"OpenAI",p:1800,d:"2024-05",t:"Omni-modal. Real-time voice."},{n:"DeepSeek-V2",o:"DeepSeek",p:236,d:"2024-05",t:"MLA! KV Cache -93%. MoE 160E."},{n:"Qwen2-72B",o:"Alibaba",p:72,d:"2024-06",t:"GQA. 128K. 30 langs. Apache 2.0."},{n:"Claude 3.5",o:"Anthropic",p:null,d:"2024-06",t:"Sonnet 3.5. Coding+Vision."},{n:"LLaMA 3.1-405B",o:"Meta",p:405,d:"2024-07",t:"405B dense. 128K."},{n:"o1",o:"OpenAI",p:null,d:"2024-09",t:"Reasoning model."},{n:"Qwen2.5-72B",o:"Alibaba",p:72,d:"2024-09",t:"18T tokens. 1M+ SFT."},{n:"DeepSeek-V3",o:"DeepSeek",p:671,d:"2024-12",t:"37B active. FP8. $5.6M. MTP."},{n:"Gemini 2.0",o:"Google",p:null,d:"2024-12",t:"Flash thinking. Agentic."},{n:"MiniMax-01",o:"MiniMax",p:456,d:"2025-01",t:"Lightning Attn. 1M ctx."},{n:"DeepSeek-R1",o:"DeepSeek",p:671,d:"2025-01",t:"Pure RL. GRPO. Aha Moment."},{n:"Qwen3-235B",o:"Alibaba",p:235,d:"2025-04",t:"Hybrid Thinking! 22B active. 119 langs."},{n:"Claude 4",o:"Anthropic",p:null,d:"2025-05",t:"Opus 4. Extended thinking."},{n:"MiniMax-M1",o:"MiniMax",p:456,d:"2025-06",t:"Hybrid Attn. CISPO. $534K RL."},{n:"Kimi K2",o:"Moonshot",p:1000,d:"2025-07",t:"1T MoE. MuonClip. SWE-bench 65.8%."},{n:"GLM-5.1",o:"Zhipu",p:null,d:"2026-01",t:"DSA. Top coding."},{n:"DeepSeek-V4",o:"DeepSeek",p:1074,d:"2026-04",t:"~1T. 1M ctx. Engram. Multimodal."},{n:"Qwen3.6-35B",o:"Alibaba",p:35,d:"2026-04",t:"3B active! MoE efficiency. Agentic Coding."},{n:"Kimi K2.6",o:"Moonshot",p:1000,d:"2026-04",t:"Agent clusters. Claw multi-agent."}];
var C={OpenAI:"#10a37f",Google:"#4285f4",Anthropic:"#d97706",Meta:"#0668e1",DeepSeek:"#4f46e5",Alibaba:"#ff6a00",Moonshot:"#ef4444",MiniMax:"#8b5cf6",Zhipu:"#0891b2",Other:"#6b7280"};

var active="all",ch=null;
function build(f){
  active=f;
  var md=M.filter(function(m){return f==="all"||m.o===f;});
  var ds=[];
  var orgs=f==="all"?Object.keys(C):[f];
  orgs.forEach(function(o){
    var om=md.filter(function(m){return m.o===o;}).filter(function(m){return m.p!=null;});
    if(om.length===0) return;
    ds.push({label:o,data:om.map(function(m){return {x:new Date(m.d+"-01").getTime(),y:m.p,r:Math.max(4,Math.sqrt(m.p)*0.4+3),m:m};}),backgroundColor:C[o]+"99",borderColor:C[o],borderWidth:1});
  });
  if(ch) ch.destroy();
  var ctx=document.getElementById("chart").getContext("2d");
  ch=new Chart(ctx,{type:"bubble",data:{datasets:ds},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"nearest",intersect:false},plugins:{tooltip:{callbacks:{label:function(c){var m=c.raw.m,s=m.n+" ("+m.o+")";if(m.p) s+=" — "+(m.p>=1000?(m.p/1000).toFixed(1)+"T":m.p+"B")+" params";if(m.t) s+="\n"+m.t;return s;}}},legend:{position:"bottom",labels:{usePointStyle:true,padding:20,font:{size:12}}}},scales:{x:{type:"time",time:{unit:"year"},title:{display:true,text:"Release Date"},min:new Date("2017-06-01").getTime(),max:new Date("2027-01-01").getTime(),grid:{color:"#e5e5e5"}},y:{type:"logarithmic",title:{display:true,text:"Parameters (Billions, log scale)"},ticks:{callback:function(v){return v>=1000?(v/1000).toFixed(1)+"T":v+"B";}},grid:{color:"#e5e5e5"}}}}});
  buildTl(f);
}
function buildTl(f){
  var md=M.filter(function(m){return f==="all"||m.o===f;});
  var g={};
  md.forEach(function(m){var y=new Date(m.d+"-01").getFullYear();if(!g[y]) g[y]=[];g[y].push(m);});
  var ys=Object.keys(g).sort().reverse(),h="";
  ys.forEach(function(y){
    h+='<div class="tl-group"><h3>'+y+'</h3><div class="tl-cards">';
    g[y].sort(function(a,b){return new Date(b.d+"-01")-new Date(a.d+"-01");}).forEach(function(m){
      var ps=m.p?(m.p>=1000?(m.p/1000).toFixed(1)+"T":m.p+"B"):"—";
      h+='<div class="tl-card" style="--card-accent:'+(C[m.o]||"#999")+'"><div class="tl-name">'+m.n+'</div><div class="tl-org">'+m.o+' · '+m.d+'</div><div class="tl-params">'+ps+' params</div>'+(m.t?'<div class="tl-note">'+m.t+'</div>':"")+'</div>';
    });
    h+="</div></div>";
  });
  document.getElementById("tl").innerHTML=h;
  document.querySelectorAll(".tl-card").forEach(function(c){c.style.setProperty("--card-accent",c.style.getPropertyValue("--card-accent"));});
}
document.getElementById("controls").addEventListener("click",function(e){if(e.target.classList.contains("filter-btn")){document.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active");});e.target.classList.add("active");build(e.target.dataset.org);}});
document.addEventListener("DOMContentLoaded",function(){build("all");});
</script>
</body>
</html>
