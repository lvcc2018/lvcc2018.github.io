---
layout: default
---
<article>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    {% if page.date %}<time>{{ page.date | date: "%Y-%m-%d" }}</time>{% endif %}
    {% if page.tags %}
    <div class="post-tags-header">
      {% for tag in page.tags %}<code>{{ tag }}</code> {% endfor %}
    </div>
    {% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
