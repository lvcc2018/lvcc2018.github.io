<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ site.description }}">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="/css/site.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-inner">
        <a class="site-title" href="/">{{ site.author }}</a>
        <p class="site-desc">{{ site.description }}</p>
        <nav class="sidebar-nav">
          <a href="/" {% if page.url == "/" %}class="active"{% endif %}>Home</a>
          <a href="/about" {% if page.url contains '/about' %}class="active"{% endif %}>About</a>
          <a href="/papers" {% if page.url contains '/papers' %}class="active"{% endif %}>Papers</a>
          <a href="/blog" {% if page.url contains '/blog' %}class="active"{% endif %}>Blog</a>
          <a href="/roadmap" {% if page.url contains '/roadmap' %}class="active"{% endif %}>Roadmap</a>
        </nav>
        <div class="sidebar-footer">
          <div class="theme-toggle" id="theme-toggle" title="Toggle dark mode">
            <span data-theme="light" class="active">☀️</span>
            <span data-theme="dark">🌙</span>
          </div>
          <div class="sidebar-footer-links">
            <a href="https://github.com/lvcc2018">GitHub</a>
            <a href="mailto:{{ site.email }}">Email</a>
          </div>
        </div>
      </div>
    </aside>
    <main class="content">
      {{ content }}
      <footer class="content-footer">
        © {{ site.time | date: "%Y" }} {{ site.author }} · Built with Jekyll
      </footer>
    </main>
  </div>
  <script>
  (function() {
    var toggle = document.getElementById('theme-toggle');
    var body = document.body;

    // Load saved theme
    var saved = localStorage.getItem('theme');
    if (saved === 'dark') {
      body.classList.add('dark');
      updateToggle('dark');
    }

    toggle.addEventListener('click', function() {
      if (body.classList.contains('dark')) {
        body.classList.remove('dark');
        localStorage.setItem('theme', 'light');
        updateToggle('light');
      } else {
        body.classList.add('dark');
        localStorage.setItem('theme', 'dark');
        updateToggle('dark');
      }
    });

    function updateToggle(theme) {
      var spans = toggle.querySelectorAll('span');
      spans.forEach(function(s) {
        s.classList.toggle('active', s.dataset.theme === theme);
      });
    }
  })();
  </script>
</body>
</html>
